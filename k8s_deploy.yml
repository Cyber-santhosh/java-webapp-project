apiVersion: apps/v1
kind: Deployment
metadata:
  name: santhosh-java
  labels:
    app: santhosh-java-app-k8s
spec:
  replicas: 4
  selector:
    matchLabels:
      app: santhosh-java-app
  template:
    metadata:
      labels:
        app: santhosh-java-app
    spec:
      containers:
       - name: santhosh-java
         image: santhosh-java-app-k8s:v1
         ports:
         - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: santhosh-java-service
  labels:
    app: santhosh-java-app-service
spec:
  selector:
    app: santhosh-java-app
  type: NodePort
  ports:
  - nodePorts: 31028
    port: 8080
    targetPort: 8080